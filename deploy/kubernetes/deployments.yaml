apiVersion: apps/v1
kind: Deployment
metadata:
  name: smtp-ingress
  namespace: email-platform
  labels:
    app: smtp-ingress
spec:
  replicas: 3
  selector:
    matchLabels:
      app: smtp-ingress
  template:
    metadata:
      labels:
        app: smtp-ingress
    spec:
      containers:
        - name: smtp-ingress
          image: gcr.io/email-platform-production/smtp-ingress:v1.2.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 2525
              name: smtp
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          envFrom:
            - configMapRef:
                name: platform-config
          env:
            - name: KAFKA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: kafka-scram-password
          readinessProbe:
            tcpSocket:
              port: 2525
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 2525
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: smtp-ingress
  namespace: email-platform
spec:
  type: LoadBalancer
  ports:
    - port: 25
      targetPort: 2525
      protocol: TCP
      name: smtp
  selector:
    app: smtp-ingress
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: retrieval-service
  namespace: email-platform
  labels:
    app: retrieval-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: retrieval-service
  template:
    metadata:
      labels:
        app: retrieval-service
    spec:
      containers:
        - name: retrieval-service
          image: gcr.io/email-platform-production/retrieval-service:v1.2.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9110
              name: pop3
            - containerPort: 9143
              name: imap
          resources:
            requests:
              cpu: "150m"
              memory: "256Mi"
            limits:
              cpu: "600m"
              memory: "512Mi"
          envFrom:
            - configMapRef:
                name: platform-config
          readinessProbe:
            tcpSocket:
              port: 9143
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 9143
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: retrieval-service
  namespace: email-platform
spec:
  type: ClusterIP
  ports:
    - port: 9110
      targetPort: 9110
      protocol: TCP
      name: pop3
    - port: 9143
      targetPort: 9143
      protocol: TCP
      name: imap
  selector:
    app: retrieval-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: security-and-search-service
  namespace: email-platform
  labels:
    app: security-and-search-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: security-and-search-service
  template:
    metadata:
      labels:
        app: security-and-search-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: security-and-search-service
          image: gcr.io/email-platform-production/security-and-search-service:v1.2.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9090
              name: http-api
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1024Mi"
          envFrom:
            - configMapRef:
                name: platform-config
          env:
            - name: PORT
              value: "9090"
            - name: ELASTICSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: elasticsearch-password
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: security-and-search-service
  namespace: email-platform
  labels:
    app: security-and-search-service
spec:
  type: ClusterIP
  ports:
    - port: 9090
      targetPort: 9090
      protocol: TCP
      name: http-api
  selector:
    app: security-and-search-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: attachment-service
  namespace: email-platform
  labels:
    app: attachment-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: attachment-service
  template:
    metadata:
      labels:
        app: attachment-service
    spec:
      containers:
        - name: attachment-service
          image: gcr.io/email-platform-production/attachment-service:v1.2.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: attachment-api
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "400m"
              memory: "256Mi"
          envFrom:
            - configMapRef:
                name: platform-config
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: minio-root-user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: minio-root-password
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: attachment-service
  namespace: email-platform
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http-api
  selector:
    app: attachment-service
