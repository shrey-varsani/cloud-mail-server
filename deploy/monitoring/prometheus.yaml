apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-server-conf
  namespace: email-platform
  labels:
    name: prometheus-server-conf
data:
  prometheus.yml: |-
    global:
      scrape_interval:     15s
      evaluation_interval: 15s

    rule_files:
      - "/etc/prometheus/alert.rules"

    alerting:
      alertmanagers:
        - static_configs:
            - targets: ["alertmanager.email-platform.svc:9093"]

    scrape_configs:
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: kubernetes_pod_name

      - job_name: 'security-and-search-service'
        static_configs:
          - targets: ['security-and-search-service.email-platform.svc.cluster.local:9090']

  alert.rules: |-
    groups:
    - name: email-platform-alerts
      rules:
      - alert: SecurityServiceDown
        expr: up{job="security-and-search-service"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Core Security and Search service is down"
          description: "All replicas of security-and-search-service have failed health checks on {{ $labels.instance }}."

      - alert: CriticalSpamSpike
        expr: rate(email_search_security_scanned_total{status="spam"}[5m]) / rate(email_search_security_scanned_total{status="total"}[5m]) > 0.40
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Incoming mail stream contains >40% spam detections"
          description: "A sudden rise in spam detections indicates an active spam or phishing campaign targeting user mailboxes. Currently: {{ $value | humanizePercentage }}."

      - alert: HighDkimSpfFailures
        expr: (rate(email_security_spf_total{result="fail"}[5m]) + rate(email_security_dkim_total{result="fail"}[5m])) > 30
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "DKIM/SPF alignment violations exceeded safety thresholds"
          description: "Over 30 authentication verification steps are failing per minute. Threat warning: possible active sender spoofing occurrence."

      - alert: ApiLatencyAnomalous
        expr: http_request_duration_seconds{quantile="0.99", job="security-and-search-service"} > 1.5
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "99th percentile API latency feels unstable (>1.5s)"
          description: "Underlying search indexes or SPF DNS lookups are bottlenecking execution requests."
